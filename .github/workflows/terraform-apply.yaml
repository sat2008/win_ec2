terraform-apply:
  name: Terraform Apply (Post-Merge)
  runs-on: ubuntu-latest
  needs: terraform-plan          # <-- Waits for plan to complete
  if: github.ref == 'refs/heads/main'
  environment:
    name: production             # optional manual approval

  steps:
    - name: Checkout Repo
      uses: actions/checkout@v4

    - name: Setup SSH key for GitHub modules
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan github.com >> ~/.ssh/known_hosts

    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::508261694247:role/GithubTerraformRole
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      working-directory: terraform
      run: terraform init

    - name: Terraform Apply
      working-directory: terraform
      run: terraform apply -auto-approve -var-file="terraform.tfvars"
      # ✅ Removed -lock=false to ensure proper locking