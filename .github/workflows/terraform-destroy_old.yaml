name: Terraform Destroy

on:
  workflow_dispatch:   # Manual trigger
    inputs:
      confirm:
        description: 'Type "yes" to confirm destroy'
        required: true

env:
  AWS_REGION: eu-west-2
  TF_IN_AUTOMATION: true

permissions:
  id-token: write
  contents: read

# Prevent multiple destroys running simultaneously
concurrency:
  group: terraform-destroy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  terraform-destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'yes' }}

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout Repo
        uses: actions/checkout@v4

      # 2️⃣ Setup SSH for private modules
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      # 3️⃣ Configure AWS credentials (OIDC)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::508261694247:role/GithubTerraformRole
          aws-region: ${{ env.AWS_REGION }}

      # 4️⃣ Setup Terraform CLI
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # 5️⃣ Terraform Init with remote backend
      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=terraform-state-repo-sg" \
            -backend-config="key=git/winec2/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}" \
            -backend-config="dynamodb_table=terraform-locks"

      # 6️⃣ Optional: Generate a destroy plan
      - name: Terraform Plan for Destroy
        working-directory: terraform
        run: |
          terraform plan -destroy -var-file="terraform.tfvars" -out=tfplan.destroy | tee destroy-plan.log

      # 7️⃣ Terraform Destroy
      - name: Terraform Destroy
        working-directory: terraform
        run: terraform apply -auto-approve tfplan.destroy | tee destroy.log

      # 8️⃣ Upload logs as artifact (v4)
      - name: Upload Destroy Logs
        uses: actions/upload-artifact@v4
        with:
          name: terraform-destroy-logs
          path: terraform/destroy.log, terraform/destroy-plan.log