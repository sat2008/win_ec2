name: Terraform CI/CD Plan + Manual Apply

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      confirm_apply:
        description: 'Type "yes" to run Terraform Apply'
        required: true
        default: 'no'

env:
  AWS_REGION: eu-west-2
  TF_IN_AUTOMATION: true

permissions:
  id-token: write
  contents: read
  pull-requests: write

# Ensures only one workflow per branch runs at a time.If a new run starts, previous runs for the same branch are canceled automatically.
concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: true

jobs:
  terraform-plan:
    name: Terraform Plan (PR)
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'  # skip when manually triggering Apply

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup SSH key for GitHub modules
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::508261694247:role/GithubTerraformRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: terraform
        run: terraform plan -var-file="terraform.tfvars" -out=tfplan.binary

      # TFLint steps omitted for brevity (you can keep them as in your current workflow)

      - name: Post Plan Results to PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: "Terraform Plan"
          message: |
            ```terraform
            ${{ steps.plan.outputs.stdout }}
            ```
  #Only runs when manually triggered via Actions → Run workflow.The confirm_apply input must equal yes.
  # This mimics a “manual approval” process on Free GitHub.
  terraform-apply:
    name: Terraform Apply (Manual)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirm_apply == 'yes'

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup SSH key for GitHub modules
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::508261694247:role/GithubTerraformRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -var-file="terraform.tfvars" -auto-approve

      - name: Upload EC2 Private Key
        uses: actions/upload-artifact@v4
        with:
          name: ec2-private-key
          path: terraform/terraform/key.pem