name: Terraform Plan

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: false
        default: 'dev'

env:
  AWS_REGION: eu-west-2
  TF_IN_AUTOMATION: true

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  terraform-plan:
    name: Terraform Plan (PR)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      # -------------------------
      #  TFLINT
      # -------------------------
      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Run TFLint
        working-directory: terraform
        run: |
          tflint --init
          tflint

      # -------------------------
      #  TFSEC
      # -------------------------
      - name: Run TFSec
        uses: aquasecurity/tfsec-action@v1.0.0
        with:
          working_directory: terraform

      # -------------------------
      #  SSH Key for private modules
      # -------------------------
      - name: Setup SSH key for GitHub modules
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      # -------------------------
      #  AWS Configure (OIDC)
      # -------------------------
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::508261694247:role/GithubTerraformRole
          aws-region: ${{ env.AWS_REGION }}

      # -------------------------
      # Terraform Setup + Plan
      # -------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: terraform
        run: terraform plan -var-file="terraform.tfvars" -out=tfplan.binary

      # -------------------------
      # Comment plan to PR
      # -------------------------
      - name: Show Terraform Plan in PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: "Terraform Plan"
          message: |
            ```terraform
            ${{ steps.plan.outputs.stdout }}
