name: Terraform Plan + TFLint Checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: false
        default: 'dev'

env:
  AWS_REGION: eu-west-2
  TF_IN_AUTOMATION: true

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  terraform:
    name: Terraform Plan + TFLint
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout Repo
        uses: actions/checkout@v4

      # Setup SSH key for GitHub modules
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      # Configure AWS credentials (OIDC)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::508261694247:role/GithubTerraformRole
          aws-region: ${{ env.AWS_REGION }}

      # Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # Terraform Init
      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      # Terraform Validate
      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      # Terraform Plan
      - name: Terraform Plan
        id: plan
        working-directory: terraform
        run: terraform plan -var-file="terraform.tfvars" -lock=false -out=tfplan.binary

      # Post Terraform Plan to PR
      - name: Post Terraform Plan as PR Comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: "Terraform Plan"
          message: |
            ```terraform
            ${{ steps.plan.outputs.stdout }}
            ```

      - name: Run TFLint
        id: tflint
        working-directory: terraform
        run: |
          # Initialize plugins
          tflint --init
          # Run TFLint and save JSON
          tflint --format json | tee tflint.json
          # Parse issues and errors
          jq -r '
            .issues[] | if .severity=="ERROR" then "❌ ERROR: \(.message) (\(.range.filename):\(.range.start.line))" 
                        else "⚠️ WARNING: \(.message) (\(.range.filename):\(.range.start.line))" end
          ' tflint.json > tflint-issues.txt
          jq -r '.errors[] | "❌ ERROR: \(.message)"' tflint.json >> tflint-issues.txt
          cat tflint-issues.txt

      # Post TFLint results to PR
      - name: Post TFLint Results to PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: "TFLint Results"
          message: |
            ```text
            ${{ steps.tflint.outputs.stdout || steps.tflint.outputs['tflint-output.txt'] }}
            ```

      # Fail workflow if TFLint detected any ERROR
      - name: Fail on TFLint Errors
        run: |
          if grep -q "❌ ERROR" terraform/tflint-output.txt; then
            echo "TFLint detected ERROR-level issues. See PR comment."
            exit 1
          else
            echo "No TFLint errors found."

